#
# TuneD profile for ThinkPad Z13 Gen 1 AMD 6850U battery power-saver mode.
#
# Inherits all Z13 hardware extras from z13-balanced, but deliberately uses
# the stock powersave EPP hint for maximum battery saving.
#

[main]
include=z13-balanced
summary=ThinkPad Z13 maximum battery saving with hardware extras

[cpu]
governor=schedutil|conservative|powersave
energy_perf_bias=powersave|power
energy_performance_preference=power
boost=1

[script]
script=${i:PROFILE_DIR}/script.sh
