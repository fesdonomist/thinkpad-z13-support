#
# TuneD profile for ThinkPad Z13 Gen 1 AMD 6850U performance mode.
#
# Inherits the Z13 hardware extras from z13-balanced, but asks amd-pstate EPP
# for a more responsive CPU policy.
#

[main]
include=z13-balanced
summary=ThinkPad Z13 performance mode with hardware extras

[cpu]
governor=schedutil|performance
energy_perf_bias=performance
energy_performance_preference=balance_performance|performance
boost=1

[acpi]
platform_profile=performance

[script]
script=${i:PROFILE_DIR}/script.sh
