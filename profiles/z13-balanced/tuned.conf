#
# TuneD profile for ThinkPad Z13 Gen 1 AMD 6850U balanced battery mode.
#
# Inherits the stock powersave profile, but keeps the machine responsive by
# using balance_power EPP and leaving CPU boost available. Z13-specific extras
# that TuneD cannot express declaratively live in script.sh.
#

[main]
include=powersave
summary=ThinkPad Z13 balanced battery mode with responsive AMD EPP

[cpu]
governor=schedutil|conservative|powersave
energy_perf_bias=powersave|power
energy_performance_preference=balance_power|power
boost=1

[acpi]
platform_profile=low-power

[script]
script=${i:PROFILE_DIR}/script.sh
