#
# AC alias for ThinkPad Z13 performance mode.
#
# TuneD's PPD compatibility layer requires a one-to-one profile mapping, so this
# profile exists to make the PPD power-saver option behave like z13-performance
# on AC power.
#

[main]
include=z13-performance
summary=ThinkPad Z13 AC power-saver alias for performance mode
