[main]
# The default PPD profile
default=balanced
battery_detection=true
sysfs_acpi_monitor=true

[profiles]
# AC/default PPD = TuneD. TuneD requires an injective mapping, so the
# power-saver and balanced AC entries are aliases that include z13-performance.
power-saver=z13-ac-power-saver
balanced=z13-ac-balanced
performance=z13-performance

[battery]
# Battery PPD = TuneD
power-saver=z13-power-saver
balanced=z13-balanced
performance=z13-performance
